<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>02. 画像 — Grab All Files テスト</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
  .css-bg-1 { background-image: url('../files/sample.png'); }
  .css-bg-2 { background-image: url("../files/sample.jpg"); }
  .css-bg-multi { background-image: url('../files/sample.svg'), url('../files/sample.gif'); }
</style>
</head>
<body>
<div class="wrap">
  <header class="site"><h1>02. 画像（lazy / srcset / picture / CSS背景）</h1></header>
  <nav class="top"><a href="../index.html">← トップ</a></nav>

  <h2><code>&lt;img src&gt;</code> + 通常表示</h2>
  <p><img src="../files/sample.png" alt="basic" width="120"></p>

  <h2><code>loading="lazy"</code> + <code>data-src</code> による遅延読み込み</h2>
  <div class="lazy-grid">
    <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciLz4="
         data-src="../files/sample.png" loading="lazy" alt="lazy 1">
    <img data-original="../files/sample.jpg" loading="lazy" alt="lazy 2">
    <img data-lazy-src="../files/sample.gif" loading="lazy" alt="lazy 3">
    <img data-zoom-image="../files/sample.webp" src="../files/sample.png" alt="lazy 4">
    <img data-highres="../files/sample.jpg" src="../files/sample.png" alt="lazy 5">
  </div>

  <h2><code>srcset</code> + <code>&lt;picture&gt;</code></h2>
  <picture>
    <source srcset="../files/sample.webp" type="image/webp">
    <source srcset="../files/sample.jpg 1x, ../files/sample.png 2x" type="image/jpeg">
    <img src="../files/sample.gif" alt="picture demo" width="160">
  </picture>

  <p>
    <img srcset="../files/sample.png 320w, ../files/sample.jpg 640w, ../files/sample.webp 1024w"
         sizes="(max-width: 600px) 320px, 640px"
         src="../files/sample.png" alt="srcset demo" width="160">
  </p>

  <h2>CSS <code>background-image</code></h2>
  <div class="bg-thumb css-bg-1"></div>
  <div class="bg-thumb css-bg-2"></div>
  <div class="bg-thumb css-bg-multi"></div>

  <p>インラインスタイル: <span class="bg-thumb" style="background-image:url('../files/sample.gif')"></span></p>
</div>
</body>
</html>
