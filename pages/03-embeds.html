<body>
<div class="wrap">
  <header class="site"><h1>03. 埋め込み（iframe / embed / object）</h1></header>
  <nav class="top"><a href="../index.html">← トップ</a></nav>

  <h2>iframe による PDF 埋め込み</h2>
  <iframe src="../files/sample.pdf" width="100%" height="280" title="iframe PDF"></iframe>

  <h2>PDF.js 風ビューア URL（クエリで実ファイル指定）</h2>
  <p>
    <a href="https://example.com/viewer/pdf?file=../files/sample-1.pdf">PDF.js viewer 風リンク</a>
  </p>
  <iframe src="../files/sample-2.pdf#view=FitH" width="100%" height="200" title="PDF with fragment"></iframe>

  <h2><code>&lt;embed&gt;</code> / <code>&lt;object&gt;</code></h2>
  <p>
    <embed src="../files/sample.pdf" type="application/pdf" width="240" height="180">
  </p>
  <p>
    <object data="../files/sample-1.pdf" type="application/pdf" width="240" height="180">
      <a href="../files/sample-1.pdf">PDF を開く</a>
    </object>
  </p>
